version: '3.8'

services:
  
  php:
    build: .
    container_name: php_api
    working_dir: /app
    volumes:
      - ./api:/app
    ports:
      - "8000:8000"
    command: php -S 0.0.0.0:8000
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: mysql_api
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: todo
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: pma
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root